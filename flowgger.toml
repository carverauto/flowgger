# flowgger.toml

# --- INPUT CONFIGURATION ---
[input]
type = "udp"
listen = "127.0.0.1:5140"
format = "rfc3164" # Your test message is in RFC 3164 format

# --- OUTPUT CONFIGURATION ---
[output]
type = "nats"
format = "gelf" # Or another format like passthrough, rfc5424, etc.
framing = "noop" # NATS output handles its own framing

# NATS JetStream specific settings
nats_url = "nats://127.0.0.1:4222"
nats_subject = "flowgger.logs"
nats_stream = "FLOWGGER" # Optional: defaults to "FLOWGGER"
nats_timeout = 30000 # Optional: ACK timeout in ms, defaults to 30000
